<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Martel+Sans:wght@200;300;400;600;700;800;900&family=Poppins:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
</head>
<style>
    
    *{
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
    }
    body{
        font-family: poppins;
    }
    header{
        display: flex;
        justify-content: space-evenly;
        padding-top: 1rem;
        height: 8vh;
    }
    .logo{
        text-transform: capitalize;
        font-size: x-large;
        font-weight: 900;
    }
    .search input{
        padding-left: 10px;
        font-weight: 500;
        font-size:medium;
    }
    button{
        background-color: #12ccaa;
        padding: 7px;
        border: none;
        border-radius: 5px;
        margin-left: .5rem;
    }
    .tags{
        font-weight: 800;
        font-size: medium;
    }
    ol{
        display: flex;
        list-style: none;
        gap: 20px;
    }
    ol li a{
        text-decoration: none;
        color: black;
    }
    ol li:hover{
        text-decoration: underline;
        transform: scale(1.1);
    }

    button:hover{
        background-color: black;
        color: white;
        border: 1px solid black;
    }
    main{
        display: flex;
        height: 80vh;
        justify-items: space-between;
        align-items: center;

    }
    article{
        display: flex;
        flex-flow: column nowrap;
        margin-left: 10%;
        width: 50vw;
    }
    article h1 p{
        color: #12ccaa;
        background-color: rgb(225, 225, 225);
        font-size:xx-large;
        font-weight: 900;
        display: inline;
    }
    article p b{
        color:#12ccaa;
    }
    section{
        margin-left: 25%;
        width: 50vw;
        display: flex;
        flex-direction: column;
        margin-right: 10%;
        align-items: center;
    }
    section img{
        transform: scale(2);
        margin-bottom: 40px;
    }
    section button{
        margin-top: 5vh;
    }
    footer{
        display: flex;
        justify-content: space-evenly;
        position: relative;
        align-items: flex-end;
        height: 12vh;
        padding-bottom: 1rem;
    }
    .icon img{
        height: 1.5rem;
        padding-left: 1rem;
    }
</style>
<body>
    <!-- NavBar -->
    <header>
        <div class="logo">LOGO</div>
        <div class="tags">
            <ol>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ol>
        </div>
        <div class="search">
            <input type="text" placeholder="Search">
            <Button>Search</Button>
        </div>
    </header>

    <!-- Main elements -->
     <main>
        <article>
            <h1>Hello,I am a <p>Web Developer</p></h1>
            <p>I am an aspiring <b>Full Stack JavaScript Developer</b>,who is crrently working as <b>a freelancer</b> for <b>National and International Client</b>.</p>
        </article>
        <section>
            <img src="https://cdn-icons-png.flaticon.com/128/3135/3135715.png" alt="">
            <button>Chat With Me</button>
        </section>
     </main>
     <footer>
        <div class="right">Copyright &copy; 2026 LOGO. All rights reserved</div>
        <div class="icon">
            <img src="https://img.icons8.com/?size=60&id=62856&format=png" alt="">
            <img src="https://img.icons8.com/?size=96&id=13930&format=png" alt="">
            <img src="https://img.icons8.com/?size=96&id=Xy10Jcu1L2Su&format=png" alt="">
            
        </div>
     </footer>
</body>
</html>
